# ============================================================
# my-webapp Helm Chart — values.yaml
# Target: OpenShift Container Platform 4.x
# Web Server: Apache httpd (UBI9 — OCP-compatible, non-root)
# Version: 0.2.0
# ============================================================

replicaCount: 1

# -------------------------------------------------------
# Application Image
# UBI9 httpd-24: OCP-certified, runs as non-root (uid 1001)
# Listens on port 8080 (HTTP) and 8443 (HTTPS) internally.
#
# WHY NOT nginx:latest?
#   The upstream nginx image runs as root and listens on
#   port 80 — both are blocked by OpenShift's default SCC
#   (restricted-v2). The UBI9 httpd-24 image is built for
#   OCP and works without any SCC escalation.
# -------------------------------------------------------
image:
  repository: registry.access.redhat.com/ubi9/httpd-24
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

# -------------------------------------------------------
# OpenShift Security Context
# Enforces restricted-v2 SCC (default in OCP 4.11+).
# Drop ALL capabilities, disallow privilege escalation.
# -------------------------------------------------------
securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

# Resources required for HPA to calculate utilisation
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -------------------------------------------------------
# Horizontal Pod Autoscaler (scale pod count)
# -------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -------------------------------------------------------
# Vertical Pod Autoscaler (scale pod size)
# WARNING: Do not enable HPA (CPU/Mem) and VPA (Auto)
# simultaneously — they will conflict.
# -------------------------------------------------------
verticalAutoscaling:
  enabled: false
  updateMode: "Off"   # Off | Initial | Recreate | Auto
  minAllowed:
    cpu: 50m
    memory: 64Mi
  maxAllowed:
    cpu: 1000m
    memory: 1Gi

# -------------------------------------------------------
# Service — ClusterIP is correct for OCP Route-based ingress
# UBI9 httpd-24 listens on 8080 internally.
# -------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# -------------------------------------------------------
# OpenShift Route (replaces K8s Ingress on OCP)
# -------------------------------------------------------
route:
  enabled: true
  # hostname: my-webapp.example.com
  tls:
    termination: edge   # edge | passthrough | reencrypt

# -------------------------------------------------------
# App Persistence (web content / uploads)
# Mounted at /var/www/html inside the httpd container.
#
# accessMode notes:
#   ReadWriteOnce  — single node (fine for 1 replica)
#   ReadWriteMany  — required if replicaCount > 1
#                    needs an RWX-capable StorageClass
#                    (e.g. ODF/Ceph, NFS, Azure File)
# -------------------------------------------------------
persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce
  storageClass: ""        # "" = use cluster default StorageClass
  volumeMode: Filesystem  # Filesystem | Block

# -------------------------------------------------------
# Application ConfigMap
# Injected as env vars into the app container.
# -------------------------------------------------------
config:
  APP_ENV: "production"
  LOG_LEVEL: "info"

# -------------------------------------------------------
# Database
# Deploys an in-cluster StatefulSet with its own PVC.
# Supported engines: postgresql | mysql | none
#
# For production, prefer a managed DB (RDS, CloudSQL, etc.)
# and set enabled: false — then supply externalHost below.
# -------------------------------------------------------
database:
  enabled: false
  engine: postgresql      # postgresql | mysql

  # Internal StatefulSet image (OCP-certified, non-root)
  postgresql:
    image: registry.access.redhat.com/rhel9/postgresql-15
    tag: latest
    port: 5432
    persistence:
      size: 5Gi
      accessMode: ReadWriteOnce
      storageClass: ""
      volumeMode: Filesystem
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  mysql:
    image: registry.access.redhat.com/rhel9/mysql-80
    tag: latest
    port: 3306
    persistence:
      size: 5Gi
      accessMode: ReadWriteOnce
      storageClass: ""
      volumeMode: Filesystem
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  # Credentials — stored in a Kubernetes Secret
  credentials:
    dbName: appdb
    username: appuser
    # password: ""   # Set via --set database.credentials.password=<value>
    #                # or a sealed-secret / Vault injection for production

  # External DB (used when enabled: false to skip the StatefulSet
  # but still inject connection env vars into the app)
  external:
    host: ""
    port: ""

livenessProbe:
  path: /
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 10
