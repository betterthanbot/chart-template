# ============================================================
# Database ClusterIP Service
# Provides a stable DNS name for the app to reach the DB:
#   postgresql: <fullname>-db:5432
#   mysql:      <fullname>-db:3306
# ============================================================
{{- if .Values.database.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "my-webapp.fullname" . }}-db
  labels:
    {{- include "my-webapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - port: {{ include "my-webapp.dbPort" . }}
      targetPort: {{ include "my-webapp.dbPortName" . }}
      protocol: TCP
      name: {{ include "my-webapp.dbPortName" . }}
  selector:
    {{- include "my-webapp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
{{- end }}
