# ============================================================
# Secret — Database credentials
# Created whenever a DB engine is configured (in-cluster or
# external). Values are base64-encoded by Helm automatically
# when using the `secret` kind with string data.
#
# PRODUCTION NOTE: Do not commit real passwords to Git.
# Supply the password at deploy time:
#   helm upgrade --install my-webapp . \
#     --set database.credentials.password=<value>
# Or use Sealed Secrets / Vault Agent Injector.
# ============================================================
{{- if or .Values.database.enabled .Values.database.external.host }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "my-webapp.fullname" . }}-db-secret
  labels:
    {{- include "my-webapp.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  db-name: {{ .Values.database.credentials.dbName | quote }}
  db-username: {{ .Values.database.credentials.username | quote }}
  db-password: {{ .Values.database.credentials.password | default "changeme" | quote }}
{{- end }}
