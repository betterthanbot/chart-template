apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-webapp.fullname" . }}
  labels:
    {{- include "my-webapp.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "my-webapp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "my-webapp.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "my-webapp.serviceAccountName" . }}

      # -------------------------------------------------------
      # OCP restricted-v2 SCC compliance (OCP 4.11+)
      # runAsNonRoot is enforced at the pod level; the container
      # securityContext below mirrors this for defense-in-depth.
      # -------------------------------------------------------
      securityContext:
        runAsNonRoot: true

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          # Container-level SCC hardening
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          # Required for HPA utilisation calculation
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # -------------------------------------------------------
          # App ConfigMap env vars
          # -------------------------------------------------------
          envFrom:
            - configMapRef:
                name: {{ include "my-webapp.fullname" . }}-config

          # -------------------------------------------------------
          # Database connection env vars (injected from Secret)
          # -------------------------------------------------------
          {{- if .Values.database.enabled }}
          env:
            - name: DB_ENGINE
              value: {{ .Values.database.engine | quote }}
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-webapp.fullname" . }}-db-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-webapp.fullname" . }}-db-secret
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-webapp.fullname" . }}-db-secret
                  key: db-password
            - name: DB_HOST
              value: {{ include "my-webapp.fullname" . }}-db
            - name: DB_PORT
              value: {{ include "my-webapp.dbPort" . | quote }}
          {{- else if .Values.database.external.host }}
          env:
            - name: DB_HOST
              value: {{ .Values.database.external.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.external.port | quote }}
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-webapp.fullname" . }}-db-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-webapp.fullname" . }}-db-secret
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-webapp.fullname" . }}-db-secret
                  key: db-password
          {{- end }}

          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}

          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: app-data
              # UBI9 httpd-24 document root — replaces /usr/share/nginx/html
              mountPath: /var/www/html
            {{- end }}

      volumes:
        {{- if .Values.persistence.enabled }}
        - name: app-data
          persistentVolumeClaim:
            claimName: {{ include "my-webapp.fullname" . }}-app
        {{- end }}
